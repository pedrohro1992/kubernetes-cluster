server:
  # Enable HA using PostgreSQL as the storage backend
  ha:
    enabled: true
    replicas: 3
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "postgresql" {
        ha_enabled = "true"
        # The postgresql backend automatically picks up the VAULT_PG_CONNECTION_URL env var
      }
      
  extraSecretEnvironmentVars:
    - envName: VAULT_PG_CONNECTION_URL
      secretName: ${database_secret_name}
      secretKey: uri

  extraInitContainers:
    - name: db-init
      image: postgres:16-alpine
      command:
        - /bin/sh
        - -c
        - |
          psql -h "$${DB_HOST}" -U "$${DB_USER}" -d "$${DB_NAME}" -c '
          CREATE TABLE IF NOT EXISTS vault_kv_store (
            parent_path TEXT COLLATE "C" NOT NULL,
            path        TEXT COLLATE "C",
            key         TEXT COLLATE "C",
            value       BYTEA,
            CONSTRAINT pkey PRIMARY KEY (path, key)
          );
          CREATE INDEX IF NOT EXISTS idx_vault_kv_store_path ON vault_kv_store (parent_path, path);
          CREATE TABLE IF NOT EXISTS vault_ha_locks (
            ha_key                                      TEXT COLLATE "C" NOT NULL,
            ha_identity                                 TEXT COLLATE "C" NOT NULL,
            ha_value                                    TEXT COLLATE "C",
            valid_until                                 TIMESTAMP WITH TIME ZONE NOT NULL,
            CONSTRAINT ha_locks_pkey PRIMARY KEY (ha_key)
          );'
      env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: ${database_secret_name}
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: ${database_secret_name}
              key: user
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: ${database_secret_name}
              key: dbname
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: ${database_secret_name}
              key: password
